{% extends "includes/base.html" %}
{% load static %}

{% block title %}Classify Content{% endblock %}

{% block content %}
<div class="container py-4">
  <section class="card">
    <div class="card-header">
      <h4 class="mb-0">Classify Content</h4>
    </div>
    <div class="card-body">
      <p class="text-muted mb-4">{{ content.title }}</p>
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">
          <i class="fas fa-save"></i> Save
        </button>
        <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
      </form>
    </div>
  </section>
</div>
{% endblock %}
